apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: calculatorgaz
  namespace: gaz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: calculatorgaz
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
