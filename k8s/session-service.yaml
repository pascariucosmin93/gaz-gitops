apiVersion: v1
kind: ConfigMap
metadata:
  name: session-service-script
  namespace: gaz
data:
  server.js: |
    const http = require('http');
    const crypto = require('crypto');

    const PORT = Number(process.env.PORT || 8088);
    const JWT_SECRET = process.env.JWT_SECRET || '';
    const TOKEN_TTL = Number(process.env.TOKEN_TTL || 86400); // 24h

    if (!JWT_SECRET) {
      console.error('JWT_SECRET is required');
      process.exit(1);
    }

    const toBase64Url = (buf) =>
      buf.toString('base64').replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

    const fromBase64Url = (str) =>
      Buffer.from(str.replace(/-/g, '+').replace(/_/g, '/'), 'base64');

    const sign = (payload) => {
      const header = toBase64Url(Buffer.from(JSON.stringify({ alg: 'HS256', typ: 'JWT' })));
      const now = Math.floor(Date.now() / 1000);
      const body = toBase64Url(Buffer.from(JSON.stringify({ ...payload, iat: now, exp: now + TOKEN_TTL })));
      const signature = toBase64Url(
        crypto.createHmac('sha256', JWT_SECRET).update(`${header}.${body}`).digest()
      );
      return `${header}.${body}.${signature}`;
    };

    const verify = (token) => {
      const parts = token.split('.');
      if (parts.length !== 3) throw new Error('Invalid token format');

      const [header, body, signature] = parts;
      const expected = toBase64Url(
        crypto.createHmac('sha256', JWT_SECRET).update(`${header}.${body}`).digest()
      );

      if (!crypto.timingSafeEqual(Buffer.from(signature), Buffer.from(expected))) {
        throw new Error('Invalid signature');
      }

      const payload = JSON.parse(fromBase64Url(body).toString());

      if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
        throw new Error('Token expired');
      }

      return payload;
    };

    const readJson = (req) =>
      new Promise((resolve, reject) => {
        let data = '';
        req.on('data', (chunk) => {
          data += chunk;
          if (data.length > 64 * 1024) {
            reject(new Error('Payload too large'));
            req.destroy();
          }
        });
        req.on('end', () => {
          try { resolve(data ? JSON.parse(data) : {}); }
          catch { reject(new Error('Invalid JSON')); }
        });
        req.on('error', reject);
      });

    const json = (res, status, payload) => {
      res.writeHead(status, { 'Content-Type': 'application/json; charset=utf-8' });
      res.end(JSON.stringify(payload));
    };

    const server = http.createServer(async (req, res) => {
      try {
        if (req.method === 'GET' && req.url === '/health') {
          return json(res, 200, { ok: true });
        }

        if (req.method === 'POST' && req.url === '/session/sign') {
          const payload = await readJson(req);
          const token = sign(payload);
          return json(res, 200, { token });
        }

        if (req.method === 'POST' && req.url === '/session/verify') {
          const { token } = await readJson(req);
          if (!token) return json(res, 400, { error: 'Missing token' });
          const payload = verify(token);
          return json(res, 200, payload);
        }

        return json(res, 404, { error: 'Not found' });
      } catch (error) {
        return json(res, 401, { error: error.message || 'Unauthorized' });
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`session-service listening on ${PORT}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-service
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-service
  template:
    metadata:
      labels:
        app: session-service
    spec:
      containers:
        - name: session-service
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8088"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
          ports:
            - containerPort: 8088
              name: http
          volumeMounts:
            - name: app-script
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: app-script
          configMap:
            name: session-service-script
---
apiVersion: v1
kind: Service
metadata:
  name: session-service
  namespace: gaz
spec:
  selector:
    app: session-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
