apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-script
  namespace: gaz
data:
  server.js: |
    const http = require('http');

    const PORT = Number(process.env.PORT || 8082);
    const DISCORD_WEBHOOK_URL = process.env.DISCORD_WEBHOOK_URL || '';

    const readJson = (req) =>
      new Promise((resolve, reject) => {
        let body = '';
        req.on('data', (chunk) => {
          body += chunk;
          if (body.length > 1024 * 1024) {
            reject(new Error('Payload too large'));
            req.destroy();
          }
        });
        req.on('end', () => {
          try {
            resolve(body ? JSON.parse(body) : {});
          } catch {
            reject(new Error('Invalid JSON'));
          }
        });
        req.on('error', reject);
      });

    const json = (res, status, payload) => {
      res.writeHead(status, { 'Content-Type': 'application/json; charset=utf-8' });
      res.end(JSON.stringify(payload));
    };

    const sendDiscord = async (payload) => {
      if (!DISCORD_WEBHOOK_URL) {
        throw new Error('DISCORD_WEBHOOK_URL is not set');
      }

      const message = payload.message || 'Notificare nouă';
      const details = payload.details || {};
      const detailText = Object.entries(details)
        .map(([k, v]) => `- ${k}: ${v}`)
        .join('\n');

      const content = detailText ? `${message}\n${detailText}` : message;
      const response = await fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Discord webhook failed (${response.status}): ${text}`);
      }
    };

    const server = http.createServer(async (req, res) => {
      try {
        if (req.method === 'GET' && req.url === '/health') {
          return json(res, 200, { ok: true });
        }

        if (req.method === 'POST' && req.url === '/notify') {
          const payload = await readJson(req);
          await sendDiscord(payload);
          return json(res, 200, { ok: true });
        }

        return json(res, 404, { error: 'Not found' });
      } catch (error) {
        return json(res, 500, { error: error.message || 'Unexpected error' });
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`notification-service listening on ${PORT}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8082"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: DISCORD_WEBHOOK_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
          ports:
            - containerPort: 8082
              name: http
          volumeMounts:
            - name: app-script
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: app-script
          configMap:
            name: notification-service-script
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: gaz
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
