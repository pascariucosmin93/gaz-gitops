apiVersion: v1
kind: ConfigMap
metadata:
  name: reporting-service-script
  namespace: gaz
data:
  server.js: |
    const http = require('http');

    const PORT = Number(process.env.PORT || 8081);
    const APP_BASE_URL = (process.env.APP_BASE_URL || 'http://calculatorgaz').replace(/\/+$/, '');

    const json = (res, code, payload) => {
      res.writeHead(code, { 'Content-Type': 'application/json; charset=utf-8' });
      res.end(JSON.stringify(payload));
    };

    const parseReadings = async (userId) => {
      const response = await fetch(`${APP_BASE_URL}/api/readings?userId=${encodeURIComponent(userId)}`);
      if (!response.ok) {
        throw new Error(`Failed to fetch readings (${response.status})`);
      }
      const data = await response.json();
      if (!Array.isArray(data)) {
        throw new Error('Invalid readings payload');
      }
      return data;
    };

    const monthKey = (iso) => {
      const d = new Date(iso);
      const y = d.getUTCFullYear();
      const m = `${d.getUTCMonth() + 1}`.padStart(2, '0');
      return `${y}-${m}`;
    };

    const aggregateMonthly = (readings) => {
      const map = new Map();
      for (const r of readings) {
        const key = monthKey(r.createdAt);
        const current = map.get(key) || { month: key, entries: 0, consumptionM3: 0, consumptionKwh: 0, total: 0 };
        current.entries += 1;
        current.consumptionM3 += Number(r.consumptionM3 || 0);
        current.consumptionKwh += Number(r.consumptionKwh || 0);
        current.total += Number(r.total || 0);
        map.set(key, current);
      }
      return [...map.values()].sort((a, b) => a.month.localeCompare(b.month));
    };

    const compareMonths = (monthly, monthA, monthB) => {
      const a = monthly.find((m) => m.month === monthA);
      const b = monthly.find((m) => m.month === monthB);
      if (!a || !b) {
        return null;
      }
      return {
        monthA: a,
        monthB: b,
        delta: {
          consumptionM3: b.consumptionM3 - a.consumptionM3,
          consumptionKwh: b.consumptionKwh - a.consumptionKwh,
          total: b.total - a.total
        }
      };
    };

    const toCsv = (monthly) => {
      const header = 'month,entries,consumption_m3,consumption_kwh,total_lei';
      const rows = monthly.map((m) => [
        m.month,
        m.entries,
        m.consumptionM3.toFixed(3),
        m.consumptionKwh.toFixed(3),
        m.total.toFixed(2)
      ].join(','));
      return [header, ...rows].join('\n');
    };

    const escapePdfText = (value) => String(value).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');

    const toSimplePdf = (lines) => {
      const content = lines
        .map((line, idx) => `BT /F1 11 Tf 50 ${770 - idx * 16} Td (${escapePdfText(line)}) Tj ET`)
        .join('\n');

      const objects = [];
      objects.push('1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj');
      objects.push('2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj');
      objects.push('3 0 obj << /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >> endobj');
      objects.push('4 0 obj << /Type /Font /Subtype /Type1 /BaseFont /Helvetica >> endobj');
      objects.push(`5 0 obj << /Length ${Buffer.byteLength(content, 'utf8')} >> stream\n${content}\nendstream endobj`);

      let body = '%PDF-1.4\n';
      const offsets = [0];
      for (const obj of objects) {
        offsets.push(Buffer.byteLength(body, 'utf8'));
        body += `${obj}\n`;
      }
      const xrefPos = Buffer.byteLength(body, 'utf8');
      body += `xref\n0 ${objects.length + 1}\n`;
      body += '0000000000 65535 f \n';
      for (let i = 1; i <= objects.length; i += 1) {
        body += `${String(offsets[i]).padStart(10, '0')} 00000 n \n`;
      }
      body += `trailer << /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF\n`;
      return Buffer.from(body, 'utf8');
    };

    const server = http.createServer(async (req, res) => {
      try {
        const url = new URL(req.url, `http://${req.headers.host}`);

        if (req.method === 'GET' && url.pathname === '/health') {
          return json(res, 200, { ok: true });
        }

        if (req.method !== 'GET') {
          return json(res, 405, { error: 'Method not allowed' });
        }

        const userId = (url.searchParams.get('userId') || '').trim();
        if (!userId) {
          return json(res, 400, { error: 'Missing userId query param' });
        }

        const readings = await parseReadings(userId);
        const monthly = aggregateMonthly(readings);

        if (url.pathname === '/report/monthly') {
          return json(res, 200, { userId, months: monthly });
        }

        if (url.pathname === '/report/compare') {
          const monthA = (url.searchParams.get('monthA') || '').trim();
          const monthB = (url.searchParams.get('monthB') || '').trim();
          if (!monthA || !monthB) {
            return json(res, 400, { error: 'monthA and monthB are required (YYYY-MM)' });
          }
          const comparison = compareMonths(monthly, monthA, monthB);
          if (!comparison) {
            return json(res, 404, { error: 'One or both months not found in readings' });
          }
          return json(res, 200, comparison);
        }

        if (url.pathname === '/report/export.csv') {
          const csv = toCsv(monthly);
          res.writeHead(200, {
            'Content-Type': 'text/csv; charset=utf-8',
            'Content-Disposition': `attachment; filename="report-${userId}.csv"`
          });
          return res.end(csv);
        }

        if (url.pathname === '/report/export.pdf') {
          const lines = [
            `Gas Consumption Report for user ${userId}`,
            'Month | Entries | m3 | kWh | Total Lei',
            ...monthly.map((m) => `${m.month} | ${m.entries} | ${m.consumptionM3.toFixed(2)} | ${m.consumptionKwh.toFixed(0)} | ${m.total.toFixed(2)}`)
          ];
          const pdf = toSimplePdf(lines);
          res.writeHead(200, {
            'Content-Type': 'application/pdf',
            'Content-Disposition': `attachment; filename="report-${userId}.pdf"`
          });
          return res.end(pdf);
        }

        return json(res, 404, { error: 'Not found' });
      } catch (error) {
        return json(res, 500, { error: error.message || 'Unexpected error' });
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`reporting-service listening on ${PORT}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
        - name: reporting-service
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8081"
            - name: APP_BASE_URL
              value: http://calculatorgaz
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8081
              name: http
          volumeMounts:
            - name: app-script
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: app-script
          configMap:
            name: reporting-service-script
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: gaz
spec:
  selector:
    app: reporting-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
