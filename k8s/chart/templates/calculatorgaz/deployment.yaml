{{- with .Values.calculatorgaz }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculatorgaz
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
    {{- include "gaz.selectorLabels" "calculatorgaz" | nindent 4 }}
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      {{- include "gaz.selectorLabels" "calculatorgaz" | nindent 6 }}
  template:
    metadata:
      annotations:
        promotedAt: {{ $.Values.promotedAt | default "initial" | quote }}
      labels:
        {{- include "gaz.selectorLabels" "calculatorgaz" | nindent 8 }}
    spec:
      {{- if gt (len (default (list) .imagePullSecrets)) 0 }}
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
      initContainers:
        - name: ensure-db-gaz
          image: {{ .initContainer.image }}
          securityContext:
            runAsUser: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            {{- range .initSecretEnv }}
            - name: {{ .envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.calculatorgaz.secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER"; do
                sleep 2
              done
              if ! psql -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='gaz'" | grep -q 1; then
                psql -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE gaz"
              fi
      containers:
        - name: calculatorgaz
          image: {{ .image.repository }}:{{ .image.tag }}
          imagePullPolicy: {{ .image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .probes.readiness.port }}
              name: http
          env:
            {{- range $k, $v := .env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range .secretEnv }}
            - name: {{ .envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.calculatorgaz.secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .probes.readiness.path }}
              port: {{ .probes.readiness.port }}
            initialDelaySeconds: {{ .probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .probes.readiness.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .probes.liveness.path }}
              port: {{ .probes.liveness.port }}
            initialDelaySeconds: {{ .probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .probes.liveness.timeoutSeconds }}
{{- end }}
