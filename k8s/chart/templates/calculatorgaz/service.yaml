{{- with .Values.calculatorgaz }}
apiVersion: v1
kind: Service
metadata:
  name: calculatorgaz
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
    {{- include "gaz.selectorLabels" "calculatorgaz" | nindent 4 }}
    {{- if .service.labels }}
    {{- toYaml .service.labels | nindent 4 }}
    {{- end }}
spec:
  type: {{ .service.type }}
  selector:
    {{- include "gaz.selectorLabels" "calculatorgaz" | nindent 4 }}
  ports:
    - name: http
      port: {{ .service.port }}
      targetPort: {{ .service.targetPort }}
{{- end }}
