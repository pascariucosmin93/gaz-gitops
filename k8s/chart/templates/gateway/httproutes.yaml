# ---------------------------------------------------------------------------
# Routes through Next.js (auth, readings, invoices, OCR, admin, health)
# ---------------------------------------------------------------------------

# API routes that need Next.js (session/Prisma/orchestration)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextjs-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: gaz-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
        - path:
            type: PathPrefix
            value: /api/readings
        - path:
            type: PathPrefix
            value: /api/invoices
        - path:
            type: PathPrefix
            value: /api/ocr
        - path:
            type: PathPrefix
            value: /api/admin
        - path:
            type: PathPrefix
            value: /api/health
        - path:
            type: PathPrefix
            value: /api/settings
        - path:
            type: PathPrefix
            value: /api/csrf
      backendRefs:
        - name: calculatorgaz
          port: 80

# ---------------------------------------------------------------------------
# Frontend: Next.js serves HTML, JS, CSS, static assets
# ---------------------------------------------------------------------------
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextjs-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: gaz-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: calculatorgaz
          port: 80

# ---------------------------------------------------------------------------
# /api/internal/* has NO HTTPRoute -> Gateway returns 404 (defense-in-depth)
# ---------------------------------------------------------------------------
{{- end }}
