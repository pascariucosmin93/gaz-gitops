{{- if .Values.gateway.enabled }}
# ---------------------------------------------------------------------------
# Direct routes to stateless microservices (bypass Next.js)
# ---------------------------------------------------------------------------

# billing-service: POST /api/calculate -> /calculate
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: billing-direct
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: gaz-gateway
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/calculate
          method: POST
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /calculate
      backendRefs:
        - name: billing-service
          port: 8080

# reporting-service: GET /api/reports/* -> /report/*
