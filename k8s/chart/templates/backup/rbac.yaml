{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-secrets-reader
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-secrets-reader
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-secrets-reader
subjects:
  - kind: ServiceAccount
    name: backup-sa
    namespace: {{ .Values.namespace }}
{{- end }}
