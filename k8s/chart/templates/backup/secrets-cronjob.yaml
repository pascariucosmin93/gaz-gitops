{{- if .Values.backup.enabled }}
{{- with .Values.backup }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-secrets
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
spec:
  schedule: {{ .secrets.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backup-sa
          imagePullSecrets:
            - name: registry-infraejobs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: backup-secrets
              image: registry.infraejobs.ro/infra/gaz/backup-secrets:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .s3.secretName }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .s3.secretName }}
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  value: {{ .s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .secrets.bucket | quote }}
                - name: RETENTION_DAYS
                  value: {{ .secrets.retentionDays | quote }}
                - name: NAMESPACE
                  value: {{ $.Values.namespace | quote }}
              command:
                - /bin/bash
                - -ec
                - |
                  DATE=$(date +%Y-%m-%d_%H%M)
                  FILENAME="secrets-${DATE}.yaml.gz"
                  echo "==> Exporting secrets from namespace ${NAMESPACE}..."
                  kubectl get secrets -n ${NAMESPACE} -o yaml | gzip > /tmp/${FILENAME}
                  echo "==> Uploading ${FILENAME} to s3://${S3_BUCKET}/..."
                  aws --endpoint-url="${S3_ENDPOINT}" s3 cp /tmp/${FILENAME} s3://${S3_BUCKET}/${FILENAME}
                  echo "==> Cleaning up backups older than ${RETENTION_DAYS} days..."
                  CUTOFF=$(date -d "-${RETENTION_DAYS} days" +%Y-%m-%d)
                  aws --endpoint-url="${S3_ENDPOINT}" s3 ls s3://${S3_BUCKET}/ | while read -r line; do
                    FILE_DATE=$(echo "$line" | awk '{print $4}' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
                    FILE_NAME=$(echo "$line" | awk '{print $4}')
                    if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" \< "$CUTOFF" ]; then
                      echo "    Deleting old backup: ${FILE_NAME}"
                      aws --endpoint-url="${S3_ENDPOINT}" s3 rm s3://${S3_BUCKET}/${FILE_NAME}
                    fi
                  done
                  rm -f /tmp/${FILENAME}
                  echo "==> Secrets backup complete!"
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "250m"
                  memory: "256Mi"
{{- end }}
{{- end }}
