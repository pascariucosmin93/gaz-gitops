{{- if .Values.backup.enabled }}
{{- with .Values.backup }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-db
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "gaz.labels" $ | nindent 4 }}
spec:
  schedule: {{ .db.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: registry-infraejobs
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            fsGroup: 70
          containers:
            - name: backup-db
              image: registry.infraejobs.ro/infra/gaz/backup-db:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PGHOST
                  value: {{ .db.host | quote }}
                - name: PGPORT
                  value: {{ .db.port | quote }}
                - name: PGDATABASE
                  value: {{ .db.database | quote }}
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .db.pgSecretName }}
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .db.pgSecretName }}
                      key: POSTGRES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .s3.secretName }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .s3.secretName }}
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  value: {{ .s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .db.bucket | quote }}
                - name: RETENTION_DAYS
                  value: {{ .db.retentionDays | quote }}
              command:
                - sh
                - -ec
                - |
                  DATE=$(date +%Y-%m-%d_%H%M)
                  FILENAME="gaz-${DATE}.sql.gz"
                  echo "==> Starting pg_dump of database ${PGDATABASE}..."
                  pg_dump --no-owner --no-acl | gzip > /tmp/${FILENAME}
                  SIZE=$(wc -c < /tmp/${FILENAME})
                  echo "==> Dump size: ${SIZE} bytes"
                  echo "==> Uploading ${FILENAME} to s3://${S3_BUCKET}/..."
                  aws --endpoint-url="${S3_ENDPOINT}" --region us-east-1 --no-verify-ssl s3 cp /tmp/${FILENAME} s3://${S3_BUCKET}/${FILENAME}
                  echo "==> Cleaning up backups older than ${RETENTION_DAYS} days..."
                  CUTOFF_TS=$(($(date +%s) - RETENTION_DAYS * 86400))
                  CUTOFF=$(date -d @${CUTOFF_TS} +%Y-%m-%d 2>/dev/null || date -r ${CUTOFF_TS} +%Y-%m-%d)
                  aws --endpoint-url="${S3_ENDPOINT}" --region us-east-1 --no-verify-ssl s3 ls s3://${S3_BUCKET}/ | while read -r line; do
                    FILE_DATE=$(echo "$line" | awk '{print $4}' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
                    FILE_NAME=$(echo "$line" | awk '{print $4}')
                    if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" \< "$CUTOFF" ]; then
                      echo "    Deleting old backup: ${FILE_NAME}"
                      aws --endpoint-url="${S3_ENDPOINT}" --region us-east-1 --no-verify-ssl s3 rm s3://${S3_BUCKET}/${FILE_NAME}
                    fi
                  done
                  rm -f /tmp/${FILENAME}
                  echo "==> Backup complete!"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
{{- end }}
{{- end }}
