namespace: gaz

# ---------------------------------------------------------------------------
# Network Policies - restrict traffic between pods
# ---------------------------------------------------------------------------
networkPolicies:
  enabled: true

# ---------------------------------------------------------------------------
# calculatorgaz - main Next.js application
# ---------------------------------------------------------------------------
calculatorgaz:
  image:
    repository: registry.infraejobs.ro/infra/gaz/calculatorgaz
    tag: "75a336"
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: registry-infraejobs

  replicaCount: 1

  service:
    type: LoadBalancer
    port: 80
    targetPort: 3000
    labels:
      cilium.io/lb-pool: pool-2
      cilium.io/bgp-advertise: "true"

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
      scaleDown:
        stabilizationWindowSeconds: 120
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60

  initContainer:
    image: postgres:16-alpine

  env:
    HOSTNAME: "0.0.0.0"
    RESET_PASSWORD_BASE_URL: "https://reset.gaz.cosmin-lab.cloud/"
    BILLING_SERVICE_URL: "http://billing-service:8080"
    REPORTING_SERVICE_URL: "http://reporting-service:8081"
    NOTIFICATION_SERVICE_URL: "http://notification-service:8082"
    AUTH_SERVICE_URL: "http://auth-service:8083"
    READING_SERVICE_URL: "http://reading-service:8084"
    PASSWORD_RESET_SERVICE_URL: "http://password-reset-service:8086"
    INVOICE_SERVICE_URL: "http://invoice-service:8087"
    SESSION_SERVICE_URL: "http://session-service:8088"
    SEAWEED_S3_ENDPOINT: "https://s3.galeata.devjobs.ro"
    SEAWEED_S3_REGION: "us-east-1"
    SEAWEED_S3_BUCKET: "facturi"
    ADMIN_EMAIL: "admin@gmail.com"
    NEXT_PUBLIC_ADMIN_EMAIL: "admin@gmail.com"

  secretName: calculatorgaz-secrets
  secretEnv:
    - envKey: DATABASE_URL
      secretKey: DATABASE_URL
    - envKey: DISCORD_RESET_WEBHOOK_URL
      secretKey: DISCORD_RESET_WEBHOOK_URL
    - envKey: SEAWEED_S3_ACCESS_KEY
      secretKey: SEAWEED_S3_ACCESS_KEY
    - envKey: SEAWEED_S3_SECRET_KEY
      secretKey: SEAWEED_S3_SECRET_KEY
    - envKey: INTERNAL_API_KEY
      secretKey: INTERNAL_API_KEY
    - envKey: ADMIN_PASSWORD
      secretKey: ADMIN_PASSWORD

  initSecretEnv:
    - envKey: PGPASSWORD
      secretKey: POSTGRES_PASSWORD
    - envKey: POSTGRES_USER
      secretKey: POSTGRES_USER

  probes:
    readiness:
      path: /api/health
      port: 3000
      initialDelaySeconds: 20
      periodSeconds: 10
    liveness:
      path: /api/health
      port: 3000
      initialDelaySeconds: 40
      periodSeconds: 15

# ---------------------------------------------------------------------------
# Microservices - ConfigMap-based Node.js services
# ---------------------------------------------------------------------------
microservices:

  auth-service:
    enabled: true
    port: 8083
    env:
      PORT: "8083"
      APP_BASE_URL: "http://calculatorgaz"
    secretName: calculatorgaz-secrets
    secretEnv:
      - envKey: INTERNAL_API_KEY
        secretKey: INTERNAL_API_KEY
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    script: |
      const http = require('http');

      const PORT = Number(process.env.PORT || 8083);
      const APP_BASE_URL = (process.env.APP_BASE_URL || 'http://calculatorgaz').replace(/\/+$/, '');
      const INTERNAL_API_KEY = process.env.INTERNAL_API_KEY || '';

      const readJson = (req) =>
        new Promise((resolve, reject) => {
          let body = '';
          req.on('data', (chunk) => {
            body += chunk;
            if (body.length > 1024 * 1024) {
              reject(new Error('Payload too large'));
              req.destroy();
            }
          });
          req.on('end', () => {
            try {
              resolve(body ? JSON.parse(body) : {});
            } catch {
              reject(new Error('Invalid JSON'));
            }
          });
          req.on('error', reject);
        });

      const writeJson = (res, status, payload) => {
        res.writeHead(status, { 'Content-Type': 'application/json; charset=utf-8' });
        res.end(JSON.stringify(payload));
      };

      const proxyJson = async (targetPath, method, payload) => {
        const response = await fetch(`${APP_BASE_URL}${targetPath}`, {
          method,
          headers: { 'Content-Type': 'application/json', 'X-Internal-Api-Key': INTERNAL_API_KEY },
          body: payload ? JSON.stringify(payload) : undefined
        });
        const text = await response.text();
        return {
          status: response.status,
          contentType: response.headers.get('content-type') || 'application/json; charset=utf-8',
          body: text
        };
      };

      const server = http.createServer(async (req, res) => {
        try {
          if (req.method === 'GET' && req.url === '/health') {
            return writeJson(res, 200, { ok: true });
          }

          if (req.method === 'POST' && req.url === '/auth/signup') {
            const payload = await readJson(req);
            const upstream = await proxyJson('/api/internal/auth/signup', 'POST', payload);
            res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
            return res.end(upstream.body);
          }

          if (req.method === 'POST' && req.url === '/auth/login') {
            const payload = await readJson(req);
            const upstream = await proxyJson('/api/internal/auth/login', 'POST', payload);
            res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
            return res.end(upstream.body);
          }

          if (req.method === 'PATCH' && req.url === '/auth/profile') {
            const payload = await readJson(req);
            const upstream = await proxyJson('/api/internal/auth/profile', 'PATCH', payload);
            res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
            return res.end(upstream.body);
          }

          if (req.method === 'POST' && req.url === '/auth/reset-password') {
            const payload = await readJson(req);
            const upstream = await proxyJson('/api/internal/auth/reset-password', 'POST', payload);
            res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
            return res.end(upstream.body);
          }

          if (req.method === 'POST' && req.url === '/auth/reset-password/confirm') {
            const payload = await readJson(req);
            const upstream = await proxyJson('/api/internal/auth/reset-password/confirm', 'POST', payload);
            res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
            return res.end(upstream.body);
          }

          return writeJson(res, 404, { error: 'Not found' });
        } catch (error) {
          return writeJson(res, 500, { error: error.message || 'Unexpected error' });
        }
      });

      server.listen(PORT, '0.0.0.0', () => {
        console.log(`auth-service listening on ${PORT}`);
      });

  billing-service:
    enabled: true
    port: 8080
    env:
      PORT: "8080"
    secretName: ""
    secretEnv: []
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    script: |
      const http = require('http');

      const readJson = (req) =>
        new Promise((resolve, reject) => {
          let body = '';
          req.on('data', (chunk) => {
            body += chunk;
            if (body.length > 1024 * 1024) {
              reject(new Error('Payload too large'));
              req.destroy();
            }
          });
          req.on('end', () => {
            try {
              resolve(body ? JSON.parse(body) : {});
            } catch {
              reject(new Error('Invalid JSON'));
            }
          });
          req.on('error', reject);
        });

      const calculate = (input) => {
        const consumptionM3 = input.currentReading - input.previousReading;
        const consumptionKwh = consumptionM3 * input.pcs;
        const consumptionMwh = consumptionKwh / 1000;

        const gasCost = consumptionMwh * input.gasPriceMwh;
        const transportCost = consumptionMwh * input.transportPriceMwh;
        const distributionCost = consumptionMwh * input.distributionPriceMwh;
        const cap26Cost = consumptionMwh * input.cap26PriceMwh;
        const cap6Cost = consumptionMwh * input.cap6PriceMwh;

        const baseCost = gasCost + transportCost + distributionCost;
        const adjustmentCost = cap26Cost + cap6Cost;
        const variableCost = baseCost + adjustmentCost;

        const pricePerKwh = variableCost / consumptionKwh;
        const pricePerM3 = variableCost / consumptionM3;
        const subtotal = variableCost + input.fixedFee;
        const vat = input.includeVat ? subtotal * input.vatRate : 0;
        const total = subtotal + vat;
        const pricePerKwhWithVat = input.includeVat ? pricePerKwh * (1 + input.vatRate) : pricePerKwh;
        const pricePerM3WithVat = input.includeVat ? pricePerM3 * (1 + input.vatRate) : pricePerM3;

        return {
          consumptionM3,
          consumptionKwh,
          consumptionMwh,
          pcs: input.pcs,
          variableCost,
          pricePerKwh,
          pricePerKwhWithVat,
          pricePerM3,
          pricePerM3WithVat,
          baseCost,
          adjustmentCost,
          fixedFee: input.fixedFee,
          subtotal,
          vat,
          vatRate: input.vatRate,
          total,
          breakdown: {
            gas: { unitPriceMwh: input.gasPriceMwh, value: gasCost },
            transport: { unitPriceMwh: input.transportPriceMwh, value: transportCost },
            distribution: { unitPriceMwh: input.distributionPriceMwh, value: distributionCost },
            cap26: { unitPriceMwh: input.cap26PriceMwh, value: cap26Cost },
            cap6: { unitPriceMwh: input.cap6PriceMwh, value: cap6Cost }
          }
        };
      };

      const server = http.createServer(async (req, res) => {
        if (req.method === 'GET' && req.url === '/health') {
          res.writeHead(200, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify({ ok: true }));
          return;
        }

        if (req.method === 'POST' && req.url === '/calculate') {
          try {
            const payload = await readJson(req);
            const result = calculate(payload);
            res.writeHead(200, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify(result));
          } catch (error) {
            res.writeHead(400, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify({ error: error.message || 'Bad request' }));
          }
          return;
        }

        res.writeHead(404, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ error: 'Not found' }));
      });

      server.listen(8080, '0.0.0.0', () => {
        console.log('billing-service listening on 8080');
      });

  reading-service:
    enabled: true
    port: 8084
    env:
      PORT: "8084"
      APP_BASE_URL: "http://calculatorgaz"
    secretName: calculatorgaz-secrets
    secretEnv:
      - envKey: INTERNAL_API_KEY
        secretKey: INTERNAL_API_KEY
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    script: |
      const http = require('http');

      const PORT = Number(process.env.PORT || 8084);
      const APP_BASE_URL = (process.env.APP_BASE_URL || 'http://calculatorgaz').replace(/\/+$/, '');
