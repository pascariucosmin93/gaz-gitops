apiVersion: v1
kind: ConfigMap
metadata:
  name: reading-service-script
  namespace: gaz
data:
  server.js: |
    const http = require('http');

    const PORT = Number(process.env.PORT || 8084);
    const APP_BASE_URL = (process.env.APP_BASE_URL || 'http://calculatorgaz').replace(/\/+$/, '');
    const INTERNAL_API_KEY = process.env.INTERNAL_API_KEY || '';

    const readJson = (req) =>
      new Promise((resolve, reject) => {
        let body = '';
        req.on('data', (chunk) => {
          body += chunk;
          if (body.length > 1024 * 1024) {
            reject(new Error('Payload too large'));
            req.destroy();
          }
        });
        req.on('end', () => {
          try {
            resolve(body ? JSON.parse(body) : {});
          } catch {
            reject(new Error('Invalid JSON'));
          }
        });
        req.on('error', reject);
      });

    const writeJson = (res, status, payload) => {
      res.writeHead(status, { 'Content-Type': 'application/json; charset=utf-8' });
      res.end(JSON.stringify(payload));
    };

    const proxyJson = async (targetPath, method, payload) => {
      const response = await fetch(`${APP_BASE_URL}${targetPath}`, {
        method,
        headers: { 'Content-Type': 'application/json', 'X-Internal-Api-Key': INTERNAL_API_KEY },
        body: payload ? JSON.stringify(payload) : undefined
      });
      const text = await response.text();
      return {
        status: response.status,
        contentType: response.headers.get('content-type') || 'application/json; charset=utf-8',
        body: text
      };
    };

    const server = http.createServer(async (req, res) => {
      try {
        const url = new URL(req.url, `http://${req.headers.host}`);

        if (req.method === 'GET' && url.pathname === '/health') {
          return writeJson(res, 200, { ok: true });
        }

        if (req.method === 'GET' && url.pathname === '/readings') {
          const userId = (url.searchParams.get('userId') || '').trim();
          const upstream = await proxyJson(`/api/internal/readings?userId=${encodeURIComponent(userId)}`, 'GET');
          res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
          return res.end(upstream.body);
        }

        if (req.method === 'POST' && url.pathname === '/readings') {
          const payload = await readJson(req);
          const upstream = await proxyJson('/api/internal/readings', 'POST', payload);
          res.writeHead(upstream.status, { 'Content-Type': upstream.contentType });
          return res.end(upstream.body);
        }

        return writeJson(res, 404, { error: 'Not found' });
      } catch (error) {
        return writeJson(res, 500, { error: error.message || 'Unexpected error' });
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`reading-service listening on ${PORT}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reading-service
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reading-service
  template:
    metadata:
      labels:
        app: reading-service
    spec:
      containers:
        - name: reading-service
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          env:
            - name: PORT
              value: "8084"
            - name: APP_BASE_URL
              value: http://calculatorgaz
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: INTERNAL_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8084
              name: http
          volumeMounts:
            - name: app-script
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: app-script
          configMap:
            name: reading-service-script
---
apiVersion: v1
kind: Service
metadata:
  name: reading-service
  namespace: gaz
spec:
  selector:
    app: reading-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
