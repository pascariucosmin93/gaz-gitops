apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - calculatorgaz.yaml
  - calculatorgaz-hpa.yaml
  - auth-service.yaml
  - billing-service.yaml
  - invoice-service.yaml
  - notification-service.yaml
  - password-reset-service.yaml
  - reading-service.yaml
  - reporting-service.yaml
  - session-service.yaml

# Single source of truth for runtime image versions used by Argo CD.
# CI updates the tag here on every successful build; Argo syncs the change.
images:
  - name: registry.infraejobs.ro/infra/gaz/calculatorgaz
    newTag: "kube"
