apiVersion: v1
kind: Namespace
metadata:
  name: gaz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculatorgaz
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculatorgaz
  template:
    metadata:
      labels:
        app: calculatorgaz
    spec:
      imagePullSecrets:
        - name: registry-infraejobs
      initContainers:
        - name: ensure-db-gaz
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: POSTGRES_USER
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER"; do
                sleep 2
              done
              if ! psql -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='gaz'" | grep -q 1; then
                psql -h postgres.postgress.svc.cluster.local -p 5432 -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE gaz"
              fi
      containers:
        - name: calculatorgaz
          image: registry.infraejobs.ro/infra/gaz/calculatorgaz:kube
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: RESET_PASSWORD_BASE_URL
              value: http://10.13.13.101:8091/resetare
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: DATABASE_URL
            - name: BILLING_SERVICE_URL
              value: http://billing-service:8080
            - name: REPORTING_SERVICE_URL
              value: http://reporting-service:8081
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8082
            - name: DISCORD_RESET_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: DISCORD_RESET_WEBHOOK_URL
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8083
            - name: PASSWORD_RESET_SERVICE_URL
              value: http://password-reset-service:8086
            - name: INVOICE_SERVICE_URL
              value: http://invoice-service:8087
            - name: READING_SERVICE_URL
              value: http://reading-service:8084
            - name: SEAWEED_S3_ENDPOINT
              value: https://s3.galeata.devjobs.ro
            - name: SEAWEED_S3_REGION
              value: us-east-1
            - name: SEAWEED_S3_BUCKET
              value: facturi
            - name: SEAWEED_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: SEAWEED_S3_ACCESS_KEY
            - name: SEAWEED_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: SEAWEED_S3_SECRET_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: INTERNAL_API_KEY
            - name: ADMIN_EMAIL
              value: admin@gmail.com
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: calculatorgaz-secrets
                  key: ADMIN_PASSWORD
            - name: NEXT_PUBLIC_ADMIN_EMAIL
              value: admin@gmail.com
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: calculatorgaz
  namespace: gaz
  labels:
    cilium.io/lb-pool: pool-2
    cilium.io/bgp-advertise: "true"
spec:
  type: LoadBalancer
  selector:
    app: calculatorgaz
  ports:
    - name: http
      port: 80
      targetPort: 3000
